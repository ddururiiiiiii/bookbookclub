<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <link href="../css/bootstrap.min.css"
          th:href="@{/css/bootstrap.min.css}" rel="stylesheet">
    <style>
        .container {
            max-width: 560px;
        }
        .field-error {
            border-color: #dc3545;
            color: #dc3545;
        }
    </style>

</head>
<body>
<div class="container">
    <div class="py-5 text-center" th:text="#{page.joinMember}"> <h2>회원 가입</h2>
    </div>
    <h4 class="mb-3">회원 가입</h4>
    <form action="member.html" th:action th:object="${member}" method="post">
        <div>
            <label for="id" th:text="#{label.member.id}">회원 아이디</label>
            <input type="text" id="id" th:field="*{id}" th:errorclass="field-error"
                   class="form-control" placeholder="회원 아이디를 입력하세요">
            <div class="field-error" th:errors="*{id}">회원ID 오류</div>
        </div>
        <div>
            <label for="nickName" th:text="#{label.member.NickName}">닉네임</label>
            <input type="text" id="nickName" th:field="*{nickName}" th:errorclass="field-error"
                   class="form-control" placeholder="닉네임을 입력하세요">
            <div class="field-error" th:errors="*{nickName}">별명 오류</div>
        </div>
        <div>
        <label for="password" th:text="#{label.member.password}">비밀번호</label>
            <input type="text" id="password" th:field="*{password}" th:errorclass="field-error"
                   class="form-control" placeholder="비밀번호를 입력하세요">
            <div class="field-error" th:errors="*{password}">비밀번호 오류</div>
        </div>
        <hr class="my-4">
        <div class="row">
            <div class="col">
                <button class="w-100 btn btn-primary btn-lg" type="submit" th:text="#{button.member.save}">회원 가입</button> </div>
            <div class="col">
                <button class="w-100 btn btn-secondary btn-lg"
                        onclick="location.href='members.html'"
                        th:onclick="|location.href='@{/basic/members}'|" type="button"
                th:text="#{button.cancel}">취소</button>
            </div>
        </div>
    </form>
</div> <!-- /container -->
</body>
</html>
