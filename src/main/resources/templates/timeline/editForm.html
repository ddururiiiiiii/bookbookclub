<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <link href="../css/bootstrap.min.css"
          th:href="@{/css/bootstrap.min.css}" rel="stylesheet">
    <style>
        .container {
            max-width: 560px;
        } </style>
</head>
<body>
<div class="container">
    <div class="py-5 text-center">
        <h2 th:text="#{page.editTimeline}">타임라인 수정 폼</h2>
    </div>
    <form action="timeline.html" th:action th:object="${timeline}" method="post">
        <div>
            <label for="timelineId" th:text="#{label.timeline.timelineId}">타임라인 ID</label>
            <input type="text" id="timelineId" th:field="*{timelineId}" class="form-control" value="1"
                   th:value="${timeline.timelineId}" readonly>
        </div>
        <div>
            <label for="memberId" th:text="#{label.member.id}">회원 ID</label>
            <input type="text" id="memberId" th:field="*{memberId}" class="form-control" value="상품A" th:value="${timeline.memberId}" readonly>
        </div>
        <div>
            <label for="bookId" th:text="#{label.timeline.bookId}">책 ID</label>
            <input type="text" id="bookId" th:field="*{bookId}" class="form-control"
                   th:value="${timeline.bookId}" readonly>
        </div>
        <div>
            <label for="bookImg" th:text="#{label.timeline.bookImg}">책 이미지</label>
            <input type="text" id="bookImg" th:field="*{bookImg}" class="form-control"
                   th:value="${timeline.bookImg}" readonly>
        </div>
        <div>
            <label for="content" th:text="#{label.timeline.content}">내용</label>
            <input type="text" id="content" th:field="*{content}" class="form-control"
                   th:value="${timeline.content}">
        </div>
        <div>
            <label for="lastUpdateDate" th:text="#{label.timeline.lastUpdateDate}">작성일</label>
            <input type="text" id="lastUpdateDate" th:field="*{lastUpdateDate}" class="form-control"
                   th:value="${timeline.lastUpdateDate}">
        </div>
        <hr class="my-4">
        <div class="row">
            <div class="col">
                <button class="w-100 btn btn-primary btn-lg" type="submit">저장
                </button>
            </div>
            <div class="col">
                <button class="w-100 btn btn-secondary btn-lg" onclick="location.href='timeline.html'"
                        th:onclick="|location.href='@{/timeline/{timelineId}(timelineId=${timeline.timelineId})}'|" type="button">취소</button>
            </div>
        </div>
    </form>
</div> <!-- /container -->
</body>
</html>
