<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
        <meta name="description" content="" />
        <meta name="author" content="" />
        <title>Personal - Start Bootstrap Template</title>
        <!-- Favicon-->
        <link rel="icon" type="image/x-icon" href="assets/favicon.ico" th:href="@{/assets/favicon.ico}" />
        <!-- Custom Google font-->
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@100;200;300;400;500;600;700;800;900&amp;display=swap" rel="stylesheet" />
        <!-- Bootstrap icons-->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.1/font/bootstrap-icons.css" rel="stylesheet" />
        <!-- Core theme CSS (includes Bootstrap)-->
        <link href="../../static/css/styles.css"
              th:href="@{/css/styles.css}"
              rel="stylesheet" />
        <style>
            a{
                text-decoration: none;
                color:black;
            }
            a:hover{
                color: black;
            }
            #wrapper {
                min-height: 100%;
                position: relative;
            }
            .bi-heart:hover{
                color:red;

            }
            footer{
                height: 80px;
                bottom: 0px;
                position: absolute;
                width: 100%;
                background-color: black;
            }
        </style>
    </head>
    <body class="d-flex flex-column h-100 bg-light">
        <main class="flex-shrink-0" id="wrapper">
            <div class="px-5 my-5">
                <div class="row gx-5 justify-content-center">
                    <div class="col-lg-11 col-xl-9 col-xxl-8" style="padding-left: 0px; padding-right: 0px;">
                        <!-- Experience Section-->
                        <section th:each="timeline : ${timelines}">
                            <!-- Experience Card 1-->
                            <div class="card shadow border-0 rounded-4" style="margin-bottom: 15px;">
                                <div class="card-body">
                                    <div class="row align-items-center gx-5">
                                        <div class="col text-center text-lg-start mb-lg-0" style="width: 20px;">
                                            <div class="bg-light p-4 rounded-4" >
                                                <div class="text-primary fw-bolder mb-2" style="text-align: center;">
                                                    <span th:text="${timeline.bookImg}">책 이미지</span>
                                                </div>
                                            </div>
                                        </div>
                                        <div class="col-lg-8" style="width: 70%;">
                                            <!-- 닉네임 -->
                                            <div class="text-primary fw-bolder" style="margin-right: 10px; float: left;">닉네임</div>
                                            <!-- 타임라인아이디 -->
                                            <span th:text="${timeline.timelineId}" style="display: none;">타임라인아이디</span>
                                            <div class="text-primary  text-muted" style="margin-bottom: 10px;">
                                                <!-- 아이디 -->
                                                @<a href="member.html" class="text-primary  text-muted" th:href="@{/basic/members/{memberId} (memberId=${timeline.memberId})}" th:text="${timeline.memberId}">회원id</a>
                                            </div>
                                            <div>
                                                <!-- 내용 -->
                                                <a href="timeline.html" th:href="@{/timeline/{timelineId} (timelineId=${timeline.timelineId})}" th:text="${timeline.content}">내용</a>
                                            </div>

                                            <!-- 책제목 -->
                                            <div class="text-primary  text-muted" style="margin-top: 10px; text-align: right">
                                                <i>최진영의 구의 증명 (2023)를 읽고</i>
                                                <span th:text="${timeline.bookId}" style="display: none;">책아이디</span>
                                            </div>
                                            <!-- 좋아요 -->
                                            <div class="text-primary  text-muted" style="margin-top: 10px; text-align: right;">
                                                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-heart" viewBox="0 0 16 16">
                                                    <path d="m8 2.748-.717-.737C5.6.281 2.514.878 1.4 3.053c-.523 1.023-.641 2.5.314 4.385.92 1.815 2.834 3.989 6.286 6.357 3.452-2.368 5.365-4.542 6.286-6.357.955-1.886.838-3.362.314-4.385C13.486.878 10.4.28 8.717 2.01L8 2.748zM8 15C-7.333 4.868 3.279-3.04 7.824 1.143c.06.055.119.112.176.171a3.12 3.12 0 0 1 .176-.17C12.72-3.042 23.333 4.867 8 15z"/>
                                                </svg>
<!--                                                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-heart-fill" viewBox="0 0 16 16" style="color:red;">-->
<!--                                                    <path fill-rule="evenodd" d="M8 1.314C12.438-3.248 23.534 4.735 8 15-7.534 4.736 3.562-3.248 8 1.314z"/>-->
<!--                                                </svg>-->
                                                <span class="small">0</span>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </section>
                        <!-- Education Section-->
                    </div>
                </div>
            </div>
        </main>
        <footer style="text-align: center;">
            <!-- 홈 -->
            <svg xmlns="http://www.w3.org/2000/svg" th:onclick="|location.href='@{/timeline}'|" style="color: white; padding: 5px; margin-right: 30px; margin-top: 10px;" width="50" height="50" fill="currentColor" class="bi bi-house" viewBox="0 0 16 16">
                <path d="M8.707 1.5a1 1 0 0 0-1.414 0L.646 8.146a.5.5 0 0 0 .708.708L2 8.207V13.5A1.5 1.5 0 0 0 3.5 15h9a1.5 1.5 0 0 0 1.5-1.5V8.207l.646.647a.5.5 0 0 0 .708-.708L13 5.793V2.5a.5.5 0 0 0-.5-.5h-1a.5.5 0 0 0-.5.5v1.293L8.707 1.5ZM13 7.207V13.5a.5.5 0 0 1-.5.5h-9a.5.5 0 0 1-.5-.5V7.207l5-5 5 5Z"/>
            </svg>
            <!-- 인기 -->
            <svg xmlns="http://www.w3.org/2000/svg" style="color: white; padding: 5px; margin-right: 30px; margin-top: 10px;" width="50" height="50" fill="currentColor" class="bi bi-book" viewBox="0 0 16 16">
                <path d="M1 2.828c.885-.37 2.154-.769 3.388-.893 1.33-.134 2.458.063 3.112.752v9.746c-.935-.53-2.12-.603-3.213-.493-1.18.12-2.37.461-3.287.811V2.828zm7.5-.141c.654-.689 1.782-.886 3.112-.752 1.234.124 2.503.523 3.388.893v9.923c-.918-.35-2.107-.692-3.287-.81-1.094-.111-2.278-.039-3.213.492V2.687zM8 1.783C7.015.936 5.587.81 4.287.94c-1.514.153-3.042.672-3.994 1.105A.5.5 0 0 0 0 2.5v11a.5.5 0 0 0 .707.455c.882-.4 2.303-.881 3.68-1.02 1.409-.142 2.59.087 3.223.877a.5.5 0 0 0 .78 0c.633-.79 1.814-1.019 3.222-.877 1.378.139 2.8.62 3.681 1.02A.5.5 0 0 0 16 13.5v-11a.5.5 0 0 0-.293-.455c-.952-.433-2.48-.952-3.994-1.105C10.413.809 8.985.936 8 1.783z"/>
            </svg>
            <!-- 검색 -->
            <svg xmlns="http://www.w3.org/2000/svg" style="color: white; padding: 5px; margin-right: 30px; margin-top: 10px;" width="50" height="50" fill="currentColor" class="bi bi-search" viewBox="0 0 16 16">
                <path d="M11.742 10.344a6.5 6.5 0 1 0-1.397 1.398h-.001c.03.04.062.078.098.115l3.85 3.85a1 1 0 0 0 1.415-1.414l-3.85-3.85a1.007 1.007 0 0 0-.115-.1zM12 6.5a5.5 5.5 0 1 1-11 0 5.5 5.5 0 0 1 11 0z"/>
            </svg>
            <!-- 쓰기 -->
            <svg xmlns="http://www.w3.org/2000/svg" th:onclick="|location.href='@{/timeline/add}'|"  style="color: white; padding: 5px; margin-right: 30px; margin-top: 10px;" width="50" height="50" fill="currentColor" class="bi bi-pencil" viewBox="0 0 16 16">
                <path d="M12.146.146a.5.5 0 0 1 .708 0l3 3a.5.5 0 0 1 0 .708l-10 10a.5.5 0 0 1-.168.11l-5 2a.5.5 0 0 1-.65-.65l2-5a.5.5 0 0 1 .11-.168l10-10zM11.207 2.5 13.5 4.793 14.793 3.5 12.5 1.207 11.207 2.5zm1.586 3L10.5 3.207 4 9.707V10h.5a.5.5 0 0 1 .5.5v.5h.5a.5.5 0 0 1 .5.5v.5h.293l6.5-6.5zm-9.761 5.175-.106.106-1.528 3.821 3.821-1.528.106-.106A.5.5 0 0 1 5 12.5V12h-.5a.5.5 0 0 1-.5-.5V11h-.5a.5.5 0 0 1-.468-.325z"/>
            </svg>
            <!-- 프로필 -->
            <svg xmlns="http://www.w3.org/2000/svg" style="color: white; padding: 5px; margin-right: 30px; margin-top: 10px;" width="50" height="50" fill="currentColor" class="bi bi-person-circle" viewBox="0 0 16 16">
                <path d="M11 6a3 3 0 1 1-6 0 3 3 0 0 1 6 0z"/>
                <path fill-rule="evenodd" d="M0 8a8 8 0 1 1 16 0A8 8 0 0 1 0 8zm8-7a7 7 0 0 0-5.468 11.37C3.242 11.226 4.805 10 8 10s4.757 1.225 5.468 2.37A7 7 0 0 0 8 1z"/>
            </svg>
        </footer>
        <!-- Bootstrap core JS-->
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
        <!-- Core theme JS-->
        <script src="../../../resources/js/scripts.js" th:href="@{/js/scripts.js}"></script>
    </body>
</html>
