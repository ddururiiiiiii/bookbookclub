<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <link href="../css/bootstrap.min.css"
          th:href="@{/css/bootstrap.min.css}" rel="stylesheet">
    <style>
        .container {
            max-width: 560px;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="py-5 text-center"> <h2>타임라인 등록</h2>
    </div>
    <h4 class="mb-3">타임라인 등록</h4>
    <form action="timeline.html" th:action th:object="${timeline}" method="post">
        <div>
            <label for="timelineId">타임라인 ID</label>
            <input type="text" id="timelineId" th:field="*{timelineId}" class="form-control" placeholder="타임라인 아이디를 입력하세요">
        </div>
        <div>
            <label for="memberId">회원 ID</label>
            <input type="text" id="memberId" th:field="*{memberId}" class="form-control" placeholder="회원아이디 입력하세요">
        </div>
        <div>
            <label for="bookId">책ID</label>
            <input type="text" id="bookId" th:field="*{bookId}" class="form-control" placeholder="책아이디를 입력하세요">
        </div>
        <div>
            <label for="bookImg">책이미지</label>
            <input type="text" id="bookImg" th:field="*{bookImg}" class="form-control" placeholder="이미지를 입력하세요">
        </div>
        <div>
            <label for="content">내용</label>
            <input type="text" id="content" th:field="*{content}" class="form-control" placeholder="내용을 입력하세요">
        </div>

        <hr class="my-4">
        <div class="row">
            <div class="col">
                <button class="w-100 btn btn-primary btn-lg" type="submit">타임라인 등록</button>
            </div>
            <div class="col">
                <button class="w-100 btn btn-secondary btn-lg"
                        onclick="location.href='allTimeline.html'"
                        th:onclick="|location.href='@{/timeline/allTimeline}'|" type="button">취소</button>
            </div>
        </div>
    </form>
</div> <!-- /container -->
</body>
</html>
